name: Get Menu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Check Date
      id: date-check
      run: bash .github/scripts/check-date.sh

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm install

    - name: Get meal menu
      if: steps.date-check.outputs.skip != 'true'
      run: node crawler/menu.js

    - name: Get news
      run: node crawler/news.js

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./data/menu/
        cname: "mcut-menu-api.henrywu.tw"
        keep_files: true
