name: Get Working Day

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 1 7 *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Get working day (current year)
      if: github.event_name == 'workflow_dispatch'
      run: node working-day.js

    - name: Get working day (last year)
      run: node working-day.js $(($(date +%Y) - 1))

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./data/menu/
        cname: "mcut-menu-api.henrywu.tw"
        keep_files: true