name: Healthcheck

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  check-api-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Check Script
        run: node healthcheck.js