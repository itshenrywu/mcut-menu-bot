name: Get Snack Menu

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      branch_exists: ${{ steps.check_step.outputs.exists }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check if branch exists
      id: check_step
      shell: bash
      run: |
        if git ls-remote --heads origin update-snack-menu | grep -q update-snack-menu; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

  build:
    needs: check

    if: needs.check.outputs.branch_exists == 'false'

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check Date
      id: date-check
      run: bash .github/scripts/check-date.sh

    - name: Set up Node.js
      if: steps.date-check.outputs.skip != 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      if: steps.date-check.outputs.skip != 'true'
      run: npm install

    - name: Get snack menu
      if: steps.date-check.outputs.skip != 'true'
      id: get_snack_menu
      run: node crawler/snack.js $MODE

    - name: Checkout
      if: ${{ steps.get_snack_menu.outputs.body != '' }}
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: gh-pages-temp

    - name: Move files
      if: ${{ steps.get_snack_menu.outputs.body != '' }}
      run: |
        cp -R data/menu/. gh-pages-temp/

    - name: Create Pull Request
      if: ${{ steps.get_snack_menu.outputs.body != '' }}
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        path: gh-pages-temp
        branch: update-snack-menu
        base: gh-pages
        commit-message: "更新宵夜菜單"
        title: "更新宵夜菜單"
        body: ${{ steps.get_snack_menu.outputs.body || '更新宵夜菜單' }}
        delete-branch: true